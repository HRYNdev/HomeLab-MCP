# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "HomeLab-MCP"
slug: "homelab-mcp"

runtime: python
entry: "src/server.py"

build:
  install: "pip install --no-cache-dir -r requirements.txt"

start:
  type: http
  command: "python src/server.py"

bridge:
  mode: http
